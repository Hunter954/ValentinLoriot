{% extends "admin/base_admin.html" %}{% block content %}<header class="admin-head"><div><p>Conteúdo</p><h1>Textos, logo e favicon do site</h1></div></header><form method="post" enctype="multipart/form-data" class="panel form-grid"><div class="wide settings-upload"><label>Logomarca do site em PNG<input type="file" name="site_logo" accept="image/png,image/webp,image/svg+xml,image/jpeg"></label>{% if settings.get('site_logo') %}<img class="preview-logo" src="{{ url_for('public.media', filename=settings.get('site_logo')) }}" alt="Logo atual">{% endif %}</div><div class="wide settings-upload"><label>Favicon em PNG<input type="file" name="site_favicon" accept="image/png,image/x-icon,image/svg+xml,image/jpeg"></label>{% if settings.get('site_favicon') %}<img class="preview-favicon" src="{{ url_for('public.media', filename=settings.get('site_favicon')) }}" alt="Favicon atual">{% endif %}</div>{% for f in fields %}<label class="{{ 'wide' if f in ['about_text','footer_about','home_subtitle'] }}">{{f}}{% if f in ['about_text','footer_about','home_subtitle'] %}<textarea name="{{f}}" rows="4">{{ settings.get(f,'') }}</textarea>{% else %}<input name="{{f}}" value="{{ settings.get(f,'') }}">{% endif %}</label>{% endfor %}<button class="primary wide"><i class="bi bi-save"></i> Salvar configurações</button></form>{% endblock %}

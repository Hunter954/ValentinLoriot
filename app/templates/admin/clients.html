{% extends "admin/base_admin.html" %}{% block content %}<header class="admin-head"><div><p>Clientes</p><h1>Logos e marcas parceiras</h1></div></header><section class="panel"><form method="post" enctype="multipart/form-data" class="inline-form"><input name="name" placeholder="Nome do cliente" required><input name="website" placeholder="Site/Instagram"><input name="sort_order" type="number" placeholder="Ordem" value="0"><label class="check"><input type="checkbox" name="is_featured" checked> aparece na home</label><input type="file" name="logo" accept="image/*"><button class="primary">Adicionar</button></form></section><section class="table panel"><table><tr><th>Cliente</th><th>Logo</th><th>Ordem</th><th></th></tr>{% for c in clients %}<tr><td>{{c.name}}</td><td>{% if c.logo_path %}<img class="mini-logo" src="{{ url_for('public.media', filename=c.logo_path) }}">{% endif %}</td><td>{{c.sort_order}}</td><td><form method="post" action="{{ url_for('admin.delete_client', id=c.id) }}"><button class="danger">Excluir</button></form></td></tr>{% endfor %}</table></section>{% endblock %}

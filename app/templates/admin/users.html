{% extends "admin/base_admin.html" %}{% block content %}<header class="admin-head"><div><p>Acesso</p><h1>Usuários administradores</h1></div></header><section class="panel"><form method="post" class="inline-form"><input name="name" placeholder="Nome"><input name="email" type="email" placeholder="E-mail" required><input name="password" type="password" placeholder="Senha" required><button class="primary">Criar usuário</button></form></section><section class="panel table"><table><tr><th>Nome</th><th>E-mail</th><th>Criado</th></tr>{% for u in users %}<tr><td>{{u.name}}</td><td>{{u.email}}</td><td>{{u.created_at.strftime('%d/%m/%Y')}}</td></tr>{% endfor %}</table></section>{% endblock %}

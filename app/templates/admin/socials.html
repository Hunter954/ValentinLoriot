{% extends "admin/base_admin.html" %}{% block content %}<header class="admin-head"><div><p>Redes</p><h1>Ícones sociais do about e rodapé</h1></div></header><section class="panel"><form method="post" class="inline-form"><input name="name" placeholder="Instagram" required><input name="url" placeholder="https://..." required><select name="icon"><option value="instagram">Instagram</option><option value="youtube">YouTube</option><option value="linkedin">LinkedIn</option></select><input type="number" name="sort_order" value="0"><button class="primary">Adicionar</button></form></section><section class="panel table"><table><tr><th>Nome</th><th>URL</th><th>Ícone</th><th></th></tr>{% for s in socials %}<tr><td>{{s.name}}</td><td>{{s.url}}</td><td>{{s.icon}}</td><td><form method="post" action="{{ url_for('admin.delete_social', id=s.id) }}"><button class="danger">Excluir</button></form></td></tr>{% endfor %}</table></section>{% endblock %}

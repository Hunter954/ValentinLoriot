<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Login Admin</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}"></head><body class="login-page"><form method="post" class="login-card"><div class="brand"><span>Valentin</span><small>Loriot Admin</small></div><h1>Entrar no painel</h1>{% for cat,msg in get_flashed_messages(with_categories=true) %}<p class="alert">{{msg}}</p>{% endfor %}<label>E-mail<input name="email" type="email" required></label><label>Senha<input name="password" type="password" required></label><button>Entrar</button></form></body></html>

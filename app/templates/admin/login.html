<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Login Admin</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}"></head><body class="login-page"><form method="post" class="login-card"><div class="brand"><span>Valentin</span><small>Loriot Admin</small></div><h1>Entrar no painel</h1>{% for cat,msg in get_flashed_messages(with_categories=true) %}<p class="alert">{{msg}}</p>{% endfor %}<label>E-mail<input name="email" type="email" required></label><label>Senha<input name="password" type="password" required></label><button><i class="bi bi-box-arrow-in-right"></i> Entrar</button></form></body></html>

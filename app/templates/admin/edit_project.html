{% extends "admin/base_admin.html" %}{% block content %}<header class="admin-head"><div><p>Editando</p><h1>{{p.title}}</h1></div><a class="primary" href="{{ url_for('public.project_detail', slug=p.slug) }}" target="_blank">Ver projeto</a></header><section class="panel"><form method="post" enctype="multipart/form-data" class="form-grid"><label>Título<input name="title" value="{{p.title}}" required></label><label>Slug<input name="slug" value="{{p.slug}}"></label><label>Categoria<input name="category" value="{{p.category}}"></label><label>Cliente<select name="client_id"><option value="">Sem cliente</option>{% for c in clients %}<option value="{{c.id}}" {{ 'selected' if p.client_id==c.id }}>{{c.name}}</option>{% endfor %}</select></label><label>Local<input name="location" value="{{p.location}}"></label><label>Ano<input name="year" value="{{p.year}}"></label><label>Tipo<input name="type_label" value="{{p.type_label}}"></label><label>Duração<input name="duration" value="{{p.duration}}"></label><label>Trocar thumbnail<input type="file" name="thumbnail" accept="image/*"></label><label>Trocar capa<input type="file" name="hero" accept="image/*"></label><label>Trocar vídeo<input type="file" name="video" accept="video/*"></label><label>Link vídeo externo<input name="external_video_url" value="{{p.external_video_url or ''}}"></label><label class="wide">Descrição<textarea name="description" rows="4">{{p.description or ''}}</textarea></label><label>Ordem<input type="number" name="sort_order" value="{{p.sort_order}}"></label><label class="check"><input type="checkbox" name="is_featured" {{ 'checked' if p.is_featured }}> destaque</label><label class="check"><input type="checkbox" name="is_reel" {{ 'checked' if p.is_reel }}> reels/evento</label><button class="primary">Salvar</button></form></section><section class="panel"><h2>Adicionar mídia na galeria</h2><form method="post" enctype="multipart/form-data" action="{{ url_for('admin.add_media', id=p.id) }}" class="inline-form"><select name="media_type"><option value="photo">Foto</option><option value="video">Vídeo</option></select><input type="file" name="file" accept="image/*,video/*"><input name="external_url" placeholder="ou URL externa"><input name="caption" placeholder="Legenda"><input name="sort_order" type="number" value="0"><button class="primary">Adicionar</button></form><div class="media-list">{% for m in p.media %}<div>{% if m.media_type == 'video' %}<video src="{{ url_for('public.media', filename=m.file_path) if m.file_path else m.external_url }}" controls></video>{% else %}<img src="{{ url_for('public.media', filename=m.file_path) if m.file_path else m.external_url }}">{% endif %}<form method="post" action="{{ url_for('admin.delete_media', id=m.id) }}"><button class="danger">Excluir</button></form></div>{% endfor %}</div></section>{% endblock %}

{% extends "admin/base_admin.html" %}{% block content %}<header class="admin-head"><div><p>Portfólio</p><h1>Projetos, vídeos e galerias</h1></div></header><section class="panel"><h2>Novo projeto</h2><form method="post" enctype="multipart/form-data" class="form-grid"><label>Título<input name="title" required></label><label>Slug opcional<input name="slug"></label><label>Categoria<input name="category" value="Vigne & hôtellerie"></label><label>Cliente<select name="client_id"><option value="">Sem cliente</option>{% for c in clients %}<option value="{{c.id}}">{{c.name}}</option>{% endfor %}</select></label><label>Local<input name="location" value="Var, France"></label><label>Ano<input name="year" value="2024"></label><label>Tipo<input name="type_label" value="Film"></label><label>Duração<input name="duration" value="3 min 42 s"></label><label>Thumbnail<input type="file" name="thumbnail" accept="image/*"></label><label>Capa/Hero<input type="file" name="hero" accept="image/*"></label><label>Vídeo local<input type="file" name="video" accept="video/*"></label><label>Link vídeo externo<input name="external_video_url"></label><label class="wide">Descrição<textarea name="description" rows="4"></textarea></label><label>Ordem<input type="number" name="sort_order" value="0"></label><label class="check"><input type="checkbox" name="is_featured" checked> destaque</label><label class="check"><input type="checkbox" name="is_reel"> reels/evento</label><button class="primary">Criar projeto</button></form></section><section class="panel table"><table><tr><th>Projeto</th><th>Categoria</th><th>Cliente</th><th></th></tr>{% for p in projects %}<tr><td>{{p.title}}</td><td>{{p.category}}</td><td>{{p.client.name if p.client else '-'}}</td><td><a class="link" href="{{ url_for('admin.edit_project', id=p.id) }}">Editar</a><form method="post" action="{{ url_for('admin.delete_project', id=p.id) }}"><button class="danger">Excluir</button></form></td></tr>{% endfor %}</table></section>{% endblock %}

{% extends "admin/base_admin.html" %}{% block content %}
<header class="admin-head"><div><p>Portfólio</p><h1>Projetos, vídeos e galerias</h1></div><button class="primary" type="button" onclick="openDialog('new-project')"><i class="bi bi-plus-circle"></i> Novo projeto</button></header>
<dialog id="new-project" class="admin-modal large"><form method="post" enctype="multipart/form-data" class="form-grid"><div class="modal-head wide"><h2>Novo projeto</h2><button type="button" class="ghost-btn" onclick="closeDialog('new-project')"><i class="bi bi-x-lg"></i></button></div><label>Título<input name="title" required></label><label>Slug opcional<input name="slug"></label><label>Categoria<input name="category" value="Vigne & hôtellerie"></label><label>Cliente<select name="client_id"><option value="">Sem cliente</option>{% for c in clients %}<option value="{{c.id}}">{{c.name}}</option>{% endfor %}</select></label><label>Local<input name="location" value="Var, France"></label><label>Ano<input name="year" value="2024"></label><label>Tipo<input name="type_label" value="Film"></label><label>Duração<input name="duration" value="3 min 42 s"></label><label>Thumbnail<input type="file" name="thumbnail" accept="image/*"></label><label>Capa/Hero<input type="file" name="hero" accept="image/*"></label><label>Vídeo local<input type="file" name="video" accept="video/*"></label><label>Link vídeo externo<input name="external_video_url"></label><label class="wide">Descrição<textarea name="description" rows="4"></textarea></label><label>Ordem<input type="number" name="sort_order" value="0"></label><label class="check"><input type="checkbox" name="is_featured" checked> destaque</label><label class="check"><input type="checkbox" name="is_reel"> reels/evento</label><button class="primary wide"><i class="bi bi-check2-circle"></i> Criar projeto</button></form></dialog>
<section class="panel table"><table><tr><th>Projeto</th><th>Categoria</th><th>Cliente</th><th>Ações</th></tr>{% for p in projects %}<tr><td>{{p.title}}</td><td>{{p.category}}</td><td>{{p.client.name if p.client else '-'}}</td><td class="actions"><a class="link-btn" href="{{ url_for('admin.edit_project', id=p.id) }}"><i class="bi bi-pencil-square"></i> Editar</a><form method="post" action="{{ url_for('admin.delete_project', id=p.id) }}" onsubmit="return confirm('Excluir este projeto?')"><button class="danger"><i class="bi bi-trash"></i> Excluir</button></form></td></tr>{% endfor %}</table></section>
<script>function openDialog(id){document.getElementById(id)?.showModal()}function closeDialog(id){document.getElementById(id)?.close()}</script>
{% endblock %}
